name: Test and Publish Docker

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          # boring.tab
          python cgmlst-dists.py --input test/boring.tab --stdout --silent > /tmp/boring_out.txt
          echo "cgmlst-dists	S1	S2	S3	S4	S5
          S1	0	3	2	3	1
          S2	3	0	4	3	3
          S3	2	4	0	1	1
          S4	3	3	1	0	1
          S5	1	3	1	1	0" | tr -d ' ' > /tmp/boring_expected.txt
          diff <(tr -d ' ' < /tmp/boring_out.txt) /tmp/boring_expected.txt && echo "boring: PASS"

          # chewie.tab
          python cgmlst-dists.py --input test/chewie.tab --stdout --silent > /tmp/chewie_out.txt
          head -1 /tmp/chewie_out.txt | grep -q "SQ93127" && echo "chewie: PASS"

          # 100.tab
          python cgmlst-dists.py --input test/100.tab --stdout --silent > /tmp/100_out.txt
          [ "$(wc -l < /tmp/100_out.txt)" -eq 101 ] && echo "100: PASS"

          echo "All tests passed"

  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
